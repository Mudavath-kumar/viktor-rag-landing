services:
  - type: web
    name: viktor-rag
    runtime: python
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend-py && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        value: /api
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11"
