services:
  - type: web
    name: viktor-rag
    runtime: python
    region: oregon
    buildCommand: bash build.sh
    startCommand: cd backend-py && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ─── Database ─────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ─── Qdrant Cloud ─────────────────────────────────────────────────────────
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: viktor_documents_v2
      - key: VECTOR_SIZE
        value: "384"

      # ─── Embedding Model ──────────────────────────────────────────────────────
      - key: EMBED_MODEL
        value: all-MiniLM-L6-v2

      # ─── xAI / Grok ───────────────────────────────────────────────────────────
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-2-latest
      - key: XAI_TEMPERATURE
        value: "0.1"
      - key: XAI_MAX_TOKENS
        value: "1200"

      # ─── Frontend ─────────────────────────────────────────────────────────────
      - key: VITE_API_URL
        value: /api

      # ─── Runtime Versions ─────────────────────────────────────────────────────
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11"

      # ─── Misc ─────────────────────────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_MB
        value: "250"
